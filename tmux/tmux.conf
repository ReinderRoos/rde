##### PREFIX #####################################################

set -g prefix C-b
unbind C-b
bind C-b send-prefix

##### TERMINAL ###################################################

set -g default-terminal "tmux-256color"
set -as terminal-features ",*:RGB"

##### BASIS ######################################################

set -g mouse on
set -g history-limit 200000
set -sg escape-time 10

set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on

##### VIM ########################################################

setw -g mode-keys vi

##### PANES ######################################################

bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"

bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

##### VI COPY MODE ###############################################

bind -T copy-mode-vi v send-keys -X begin-selection
bind -T copy-mode-vi y send-keys -X copy-selection-and-cancel

##### RDE PROJECTROLES ############################################

# Rechtstreeks wisselen zonder tmux-prefix:
#
# Alt+s  projectshell
# Alt+a  Claude Code
# Alt+c  Cursor Agent
# Alt+g  Lazygit

bind-key -n M-s run-shell \
    "$HOME/.local/scripts/rde-role shell"

bind-key -n M-a run-shell \
    "$HOME/.local/scripts/rde-role claude"

bind-key -n M-c run-shell \
    "$HOME/.local/scripts/rde-role cursor"

bind-key -n M-g run-shell \
    "$HOME/.local/scripts/rde-role git"

##### NORMALE TMUX-NAVIGATIE ######################################

bind S new-window \
    -c "#{pane_current_path}" \
    -n "shell"

##### RELOAD #####################################################

bind r source-file ~/.tmux.conf \; \
    display-message "tmux-configuratie herladen"

##### WEERGAVE ###################################################

set -g status-position bottom
set -g status-style bg=colour236

set -g pane-border-style fg=colour238
set -g pane-active-border-style fg=green
